<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScanUpload QR Code Generator — Vanilla JS Demo</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center font-sans">
    <div class="bg-white shadow-xl rounded-lg p-8 max-w-md w-full">
      <h2 class="text-2xl font-bold text-center mb-4">Vanilla JS Demo</h2>

      <!-- Tab switcher -->
      <div class="flex border-b border-gray-200 mb-4">
        <button id="tab-split" type="button"
                class="flex-1 py-2 px-4 text-sm font-medium text-center border-b-2 border-blue-600 text-blue-600">
          HTML + JS (Split)
        </button>
        <button id="tab-widget" type="button"
                class="flex-1 py-2 px-4 text-sm font-medium text-center border-b-2 border-transparent text-gray-500 hover:text-gray-700">
          Drop-in Widget
        </button>
      </div>

      <!-- ══════════════════════════════════════════════════════════════ -->
      <!-- Panel 1: Split approach (HTML + JS with Tailwind)            -->
      <!-- ══════════════════════════════════════════════════════════════ -->
      <div id="panel-split">
        <section id="qr-root" class="relative overflow-hidden p-2">

          <!-- Loading overlay -->
          <div id="qr-loading-overlay" class="absolute inset-0 bg-white/90 flex items-center justify-center rounded-md z-10 hidden">
            <div class="flex flex-col items-center text-center gap-2">
              <div class="rounded-full h-6 w-6 border-t-2 border-blue-800 border-dashed animate-spin"></div>
              <p class="text-gray-900 text-sm">Loading...</p>
            </div>
          </div>

          <!-- Error / retry overlay -->
          <div id="qr-error-overlay" class="absolute inset-0 bg-white/90 flex items-center justify-center rounded-md z-10 hidden">
            <div class="flex flex-col items-center text-center mt-5 gap-2">
              <p class="text-gray-900 text-xs">Cannot create session</p>
              <button id="qr-error-retry-btn" type="button" class="bg-blue-300 text-white py-1 px-2 rounded-md hover:bg-blue-500 transition-colors">
              </button>
            </div>
          </div>

          <!-- Content -->
          <div class="flex flex-col items-center text-center">
            <header class="mb-2">
              <h1 class="text-xl font-semibold text-gray-600">Upload files from mobile device</h1>
            </header>

            <div id="qr-wrapper" aria-label="QR Code for file upload"
                 class="bg-white p-2 rounded-2xl border-2 border-dashed border-gray-300 w-40 h-40 flex items-center justify-center transition-all duration-300 hover:shadow-lg hover:scale-105 relative cursor-pointer">
              <div class="relative inline-block w-full h-full">
                <div id="qr-code" class="w-full h-full flex items-center justify-center"></div>
                <div id="qr-logo-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                  <svg id="qr-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                       class="w-6 h-6 text-white bg-gradient-to-r from-red-600 to-red-800 rounded-2xl p-1">
                    <path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zm0 3H19V19h-1.5v-1.5zM22 7h-2V4h-3V2h5v5zm0 15v-5h-2v3h-3v2h5zM2 22h5v-2H4v-3H2v5zM2 2v5h2V4h3V2H2z"/>
                  </svg>
                </div>
              </div>
              <p class="sr-only">QR Code that allows file uploads</p>
            </div>

            <div class="flex flex-row mt-3">
              <p class="text-gray-500 text-sm">Click QR code to reload</p>
            </div>

            <div id="qr-files" class="flex flex-row justify-center gap-1 flex-wrap"></div>
          </div>
        </section>
      </div>

      <!-- ══════════════════════════════════════════════════════════════ -->
      <!-- Panel 2: Drop-in Widget (QrCodeGeneratorElement)             -->
      <!-- ══════════════════════════════════════════════════════════════ -->
      <div id="panel-widget" class="hidden">
        <div id="widget-container"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
